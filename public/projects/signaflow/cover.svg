<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#09090b" />
  <defs>
    <linearGradient id="sf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#sf-grad)" />
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
  
  <!-- Logo & Header -->
  <text x="80" y="70" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="20" fill="#ffffff">SIGNA<tspan fill="#8b5cf6">FLOW</tspan></text>
  <rect x="620" y="50" width="100" height="28" rx="14" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="1" />
  <text x="670" y="68" font-family="'Exo 2', sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Document Vault</text>
  
  <!-- Hero / Description Mock -->
  <text x="80" y="140" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="28" fill="#ffffff">Document Routing Workflow</text>
  <text x="80" y="170" font-family="'Exo 2', sans-serif" font-size="13" fill="#a1a1aa">Route contracts and credentials through sequential approval chains.</text>
  
  <!-- Mock Active Document Routing Card -->
  <rect x="80" y="210" width="640" height="190" rx="12" fill="#18181b" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  
  <!-- Doc Preview Left -->
  <rect x="110" y="240" width="100" height="130" rx="4" fill="#09090b" stroke="#ffffff" stroke-opacity="0.1" />
  <rect x="125" y="260" width="70" height="6" rx="1" fill="#ffffff" fill-opacity="0.2" />
  <rect x="125" y="275" width="70" height="6" rx="1" fill="#ffffff" fill-opacity="0.2" />
  <rect x="125" y="290" width="50" height="6" rx="1" fill="#ffffff" fill-opacity="0.2" />
  <!-- Signature Glow -->
  <path d="M 130,340 C 140,320 150,350 160,330" fill="none" stroke="#8b5cf6" stroke-width="2" />
  <circle cx="185" cy="340" r="10" fill="#10b981" />
  <path d="M 182,340 L 184,342 L 188,338" fill="none" stroke="#ffffff" stroke-width="1.5" />

  <!-- Routing Chain Right -->
  <text x="250" y="255" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="14" fill="#ffffff">Approval Queue</text>
  
  <!-- Step 1 -->
  <circle cx="265" cy="295" r="12" fill="#10b981" />
  <path d="M 261,295 L 263,297 L 267,293" fill="none" stroke="#ffffff" stroke-width="2" />
  <text x="290" y="295" font-family="'Exo 2', sans-serif" font-weight="bold" font-size="12" fill="#ffffff">Dean's Office</text>
  <text x="290" y="310" font-family="'Exo 2', sans-serif" font-size="10" fill="#a1a1aa">Approved &amp; Digitally Signed</text>
  
  <!-- Line connecting -->
  <line x1="390" y1="295" x2="440" y2="295" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2" />

  <!-- Step 2 -->
  <circle cx="475" cy="295" r="12" fill="#8b5cf6" />
  <circle cx="475" cy="295" r="7" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="500" y="295" font-family="'Exo 2', sans-serif" font-weight="bold" font-size="12" fill="#ffffff">VP Academics</text>
  <text x="500" y="310" font-family="'Exo 2', sans-serif" font-size="10" fill="#8b5cf6">Awaiting Review</text>
  
  <circle cx="720" cy="180" r="100" fill="#8b5cf6" filter="blur(60px)" opacity="0.15" />
</svg>
