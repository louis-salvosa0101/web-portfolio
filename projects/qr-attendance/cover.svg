<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#09090b" />
  <defs>
    <linearGradient id="qa-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#qa-grad)" />
  
  <!-- Logo & Header -->
  <text x="80" y="70" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="20" fill="#ffffff">QR<tspan fill="#10b981">ATTEND</tspan></text>
  <rect x="620" y="50" width="100" height="28" rx="14" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1" />
  <text x="670" y="68" font-family="'Exo 2', sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Scanner Active</text>
  
  <!-- Hero Details -->
  <text x="80" y="140" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="28" fill="#ffffff">Webcam QR Attendance</text>
  <text x="80" y="170" font-family="'Exo 2', sans-serif" font-size="13" fill="#a1a1aa">Replace event paper logs with instant cryptographic QR scanning.</text>
  
  <!-- Main layout card -->
  <rect x="80" y="210" width="640" height="190" rx="12" fill="#18181b" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  
  <!-- Left Side: Webcam scan viewport -->
  <rect x="110" y="235" width="220" height="140" rx="6" fill="#09090b" stroke="#10b981" stroke-width="1.5" />
  <!-- QR target guide overlay -->
  <path d="M 190,275 L 205,275 M 190,275 L 190,290" fill="none" stroke="#10b981" stroke-width="2.5" />
  <path d="M 250,275 L 235,275 M 250,275 L 250,290" fill="none" stroke="#10b981" stroke-width="2.5" />
  <path d="M 190,335 L 205,335 M 190,335 L 190,320" fill="none" stroke="#10b981" stroke-width="2.5" />
  <path d="M 250,335 L 235,335 M 250,335 L 250,320" fill="none" stroke="#10b981" stroke-width="2.5" />
  <!-- Student profile mock inside feed -->
  <circle cx="220" cy="305" r="20" fill="#10b981" fill-opacity="0.3" />
  
  <!-- Right Side: Scanned Student Log -->
  <rect x="360" y="235" width="330" height="140" rx="6" fill="#09090b" stroke="#ffffff" stroke-opacity="0.05" />
  
  <!-- Success Scan -->
  <circle cx="390" cy="270" r="14" fill="#10b981" />
  <path d="M 386,270 L 389,273 L 395,267" fill="none" stroke="#ffffff" stroke-width="2" />
  <text x="420" y="270" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="12" fill="#ffffff">ATTENDANCE RECORDED</text>
  <text x="420" y="285" font-family="'Exo 2', sans-serif" font-size="10" fill="#a1a1aa">Student: Karl Louis Salvosa</text>
  
  <line x1="380" y1="310" x2="670" y2="310" stroke="#ffffff" stroke-opacity="0.05" />
  
  <!-- Fines status -->
  <text x="390" y="340" font-family="'Exo 2', sans-serif" font-size="11" fill="#a1a1aa">Session Status:</text>
  <text x="490" y="340" font-family="'Orbitron', sans-serif" font-size="11" fill="#10b981">On Time</text>
  <text x="390" y="360" font-family="'Exo 2', sans-serif" font-size="11" fill="#a1a1aa">Fine Balance:</text>
  <text x="490" y="360" font-family="'Orbitron', sans-serif" font-size="11" fill="#f59e0b">PHP 0.00</text>
</svg>
